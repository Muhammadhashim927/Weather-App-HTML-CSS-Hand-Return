<!doctype html>

  <body>
    <h1>weatherapp</h1>
    <form
      onsubmit="
        checkWeather();
        return false;
      "
    >
      <input type="text" name="cityName" id="cityName" />
      <button>Check Weather 🌦️</button>
    </form>
    <div id="weather"></div>
    <link rel="stylesheet" href="style.css">
    <script>
      function checkWeather() {
        const cityRef = document.querySelector("#cityName");
        const cityValue = cityRef.value;
        const weatherRef = document.querySelector("#weather");
        // api calling
        const cityRES = fetch(
          `https://p2pclouds.up.railway.app/v1/learn/weather?city=${cityValue}`
        );
        cityRES
          .then((data) => {
            return data.json();
          })
          .then((data) => {
            weatherRef.innerHTML = `${cityValue} Its Temprature feels like is ${data["current"]["feelslike_c"]}`;
          })
          .catch((err) => {
            console.log(err);
          });
      }
    </script>
